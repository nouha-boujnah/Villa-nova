<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ile-de-France Nature Animation</title>
  <link rel="stylesheet" href="sass/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Irish+Grover&display=swap" rel="stylesheet">
</head>

<body>

  <header>
    <img src="images/Logo.png" alt="Logo Nature Animation">
    <h1>Ile-de-France Nature Animation</h1>
  </header>

  <main>

    <section aria-label="Ambiance sonore" style="text-align:center; padding: 1rem;">
      <audio id="bgMusic" loop>
        <source src="images/diepthanhdk-soft-pads-amp-bamboo-flute-426619.mp3" type="audio/mpeg">
      </audio>
      <button id="btnSon" onclick="toggleSon()" style="background-color:#6B9080; color:white; border:none; padding:0.5rem 1.2rem; border-radius:20px; cursor:pointer; font-size:0.9rem;">
        Activer la musique
      </button>
    </section>

    <section id="container" aria-label="Liste des evenements">
    </section>

  </main>

  <footer>
    <p>Ile-de-France Nature Animation</p>
  </footer>

  <script src="js/app.js"></script>
  <script>
    var music = document.getElementById("bgMusic");
    var btn = document.getElementById("btnSon");
    var playing = false;

    function toggleSon() {
      if (!playing) {
        music.play();
        btn.textContent = "Couper la musique";
        playing = true;
      } else {
        music.pause();
        btn.textContent = "Activer la musique";
        playing = false;
      }
    }
  </script>

</body>
</html>
